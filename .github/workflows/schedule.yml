name: Run TikTok to YouTube Shorts Agent

on:
  schedule:
    # Runs twice a day automatically
    - cron: '0 6 * * *'   # 1. Subah 11:00 AM PKT (06:00 UTC)
    - cron: '0 12 * * *'  # 2. Shaam 05:00 PM PKT (12:00 UTC)
    - cron: '0 17 * * *'  # 3. Raat 10:00 PM PKT (17:00 UTC)
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Restore Database Cache
        uses: actions/cache@v3
        with:
          path: videos.db
          key: videos-db-${{ github.run_id }}
          restore-keys: |
            videos-db-

      - name: Install System FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Execute Automation Script
        env:
          TIKTOK_PROFILE_URL: ${{ secrets.TIKTOK_PROFILE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: python app.py